services:

  postgres:
    image: postgres:16

    container_name: portfolio_postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: portfolio_db
      POSTGRES_USER: ale
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .

    container_name: portfolio_backend

    restart: unless-stopped

    depends_on:
      - postgres

    env_file:
      - .env

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

volumes:
  postgres_data: